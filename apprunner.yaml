version: 1.0
runtime: python311
build:
  commands:
    pre_build:
      - pip install --upgrade pip
    build:
      - pip install -r requirements.txt
run:
  command: gunicorn --bind 0.0.0.0:8080 --workers 2 --threads 2 app:app
  network:
    port: 8080
  env:
    - name: ADMIN_PIN
      value: "2026"
