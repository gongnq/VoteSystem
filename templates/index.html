<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>2026 Asia Demo Crawl</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f1117">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Demo Crawl">
<link rel="apple-touch-icon" href="/icon-192.png">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #242836;
  --border: #2e3348; --text: #e4e6f0; --text2: #8b8fa8;
  --primary: #6c5ce7; --success: #00b894; --warning: #fdcb6e;
  --npi: #0984e3; --nti: #e17055;
  --npi-bg: rgba(9,132,227,.12); --nti-bg: rgba(225,112,85,.12);
  --radius: 12px; --radius-sm: 8px;
}
html { font-size: 16px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
button { cursor: pointer; font-family: inherit; font-size: inherit; }
input, select { font-family: inherit; font-size: inherit; }
.hidden { display: none !important; }

/* ===== LAYOUT ===== */
.container { max-width: 100%; margin: 0 auto; padding: 10px 16px; }
#view-judge { min-height: 100vh; display: flex; flex-direction: column; }
.header { display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
.header h1 { font-size: 1.5rem; font-weight: 700; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.btn { padding: 8px 16px; border: none; border-radius: var(--radius-sm);
  font-weight: 600; font-size: 0.85rem; transition: all .15s; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-outline { background: transparent; color: var(--text2); border: 1px solid var(--border); }
.btn-sm { padding: 5px 12px; font-size: 0.78rem; }
.btn-success { background: var(--success); color: #fff; }

/* ===== LOGIN ===== */
.login-card { max-width: 480px; margin: 60px auto; background: var(--surface);
  border-radius: var(--radius); padding: 44px 40px; border: 1px solid var(--border); }
.login-card h2 { text-align: center; margin-bottom: 10px; font-size: 2rem; }
.login-card p { text-align: center; color: var(--text2); margin-bottom: 30px; font-size: 1rem; }
.login-card select { width: 100%; padding: 16px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text);
  font-size: 1.1rem; margin-bottom: 20px; appearance: auto; }
.login-card .btn { width: 100%; padding: 16px; font-size: 1.1rem; }

/* ===== PROGRESS BAR ===== */
.progress-wrap { margin-bottom: 8px; }
.progress-label { display: flex; justify-content: space-between; margin-bottom: 4px;
  font-size: 0.78rem; color: var(--text2); }
.progress-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), var(--success));
  border-radius: 3px; transition: width .3s ease; }

/* ===== MAIN LAYOUT: grid left 2/3 + scan right 1/3 ===== */
.main-layout { display: flex; gap: 16px; flex: 1; min-height: 0; }
.scan-col { display: flex; flex-direction: column; align-items: center; justify-content: center;
  width: 33%; flex-shrink: 0; order: 1; }
.grid-col { flex: 1; overflow: hidden; order: 2; }

/* ===== SCAN BUTTON ===== */
.btn-scan { padding: 48px 40px; font-size: 1.6rem; border: none; border-radius: 20px;
  background: linear-gradient(135deg, var(--primary), #a29bfe); color: #fff;
  font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 16px;
  box-shadow: 0 6px 30px rgba(108,92,231,.4); transition: all .2s; width: 85%; }
.btn-scan:hover { transform: translateY(-2px); box-shadow: 0 8px 36px rgba(108,92,231,.5); }
.btn-scan svg { width: 80px; height: 80px; }
.scan-hint { color: var(--text2); font-size: 0.8rem; margin-top: 8px; text-align: center; }
.qr-reader-wrap { width: 100%; margin-bottom: 12px; position: relative; }
#qr-reader { width: 100%; border-radius: var(--radius); overflow: hidden; }

/* ===== GROUP GRID ===== */
.group-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 8px; align-content: stretch; height: 100%; }
.group-card { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 10px 10px; cursor: pointer;
  transition: all .15s; display: grid;
  grid-template-rows: auto auto auto;
  align-content: center;
  justify-items: center; text-align: center;
  min-height: 72px; position: relative; }
.group-card:hover { border-color: var(--primary); transform: translateY(-1px); }
.group-card.scored { border-color: var(--success); background: var(--success); color: #fff; }
.group-card.scored .group-num { color: #fff; }
.group-card.scored .group-name { color: #fff; }
.group-card.scored .badge { background: rgba(255,255,255,.2); color: #fff; }
.badge-prfaq { background: rgba(253,203,110,.18); color: #fdcb6e; margin-left: 4px; }
.group-card.scored .badge-prfaq { background: rgba(253,203,110,.25); color: #fdcb6e; }
.group-card.active { border-color: var(--primary); background: var(--surface2); }
.card-badges { display: flex; gap: 3px; position: absolute; top: 6px; left: 8px; }
.badge { padding: 3px 10px; border-radius: 12px; font-size: 0.72rem;
  font-weight: 700; text-transform: uppercase; letter-spacing: .5px; display: inline-block; }
.badge-NPI { background: var(--npi-bg); color: var(--npi); }
.badge-NTI { background: var(--nti-bg); color: var(--nti); }
.group-num { font-size: 1.8rem; font-weight: 800; color: var(--primary); line-height: 1;
  height: 2rem; display: flex; align-items: center; margin-bottom: 30px; }
.group-name { font-weight: 600; font-size: 2.6rem; line-height: 1.3;
  display: flex; align-items: start; justify-content: center;
  min-height: 4.9em; }
.group-card .check-mark { font-size: 0.9rem; }

/* ===== VOTING PANEL (full-screen overlay) ===== */
.voting-panel { position: fixed; inset: 0; background: var(--bg); z-index: 100;
  display: flex; flex-direction: column; padding: 20px 32px; overflow: hidden; }
.voting-header { display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; flex-shrink: 0; }
.voting-header h3 { font-size: 1.6rem; font-weight: 700;
  background: linear-gradient(135deg, var(--primary), #a29bfe);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; }
.btn-close-vote { padding: 12px 28px; font-size: 1rem; border: 2px solid var(--border);
  border-radius: var(--radius); background: var(--surface2); color: var(--text);
  font-weight: 600; transition: all .15s; }
.btn-close-vote:hover { border-color: var(--text); color: #fff; }
.vote-options { display: flex; justify-content: center; align-items: center;
  gap: 28px; flex: 1; margin-bottom: 16px; min-height: 0; }
.vote-option-btn { aspect-ratio: 1; width: min(38vh, 28vw); max-width: 360px;
  border: 2px solid var(--border); border-radius: 16px;
  background: var(--surface2); color: var(--text); font-size: 1.8rem; font-weight: 700;
  transition: all .2s; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 20px; line-height: 1.2; word-break: break-word; }
.vote-option-btn:hover { border-color: var(--text2); transform: scale(1.02); }
.vote-option-btn.selected { border-color: #fff; background: #4caf50; color: #fff;
  box-shadow: 0 0 0 4px rgba(76,175,80,.5), 0 8px 24px rgba(76,175,80,.3); transform: scale(1.03); }
.option-subtitle { display: block; font-size: 0.7em; font-weight: 400; margin-top: 8px; opacity: .75; }
.submit-row { display: flex; justify-content: center; gap: 16px; flex-shrink: 0; padding-bottom: 12px; }
.submit-row .btn { padding: 16px 56px; font-size: 1.1rem; }

/* ===== TOAST ===== */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
  background: var(--success); color: #fff; padding: 12px 28px; border-radius: var(--radius-sm);
  font-weight: 600; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* ===== CONFETTI ===== */
.confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 9999; overflow: hidden; }
.confetti-piece { position: absolute; width: 10px; height: 10px; top: -20px;
  animation: confetti-fall linear forwards; }
@keyframes confetti-fall {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  80% { opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
}
.celebration-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 3rem; font-weight: 800; text-align: center; z-index: 10000; pointer-events: none;
  background: linear-gradient(135deg, #fdcb6e, #e17055, #6c5ce7, #00b894);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: celebration-pop 0.6s ease-out forwards, celebration-fade 3s ease-in forwards; }
@keyframes celebration-pop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
  50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
@keyframes celebration-fade { 0%, 70% { opacity: 1; } 100% { opacity: 0; } }

/* ===== COMMENT BOX ===== */
.comment-wrap { width: 100%; max-width: 600px; margin: 0 auto; flex-shrink: 0; }
.comment-input { width: 100%; padding: 14px 18px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text);
  font-size: 1rem; resize: vertical; min-height: 70px; max-height: 160px;
  font-family: inherit; }
.comment-input::placeholder { color: var(--text2); }
.comment-label { font-size: 0.78rem; color: var(--text2); margin-bottom: 4px; }

/* ===== INSTRUCTIONS MODAL ===== */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 200; display: flex; align-items: center; justify-content: center;
  animation: modalFadeIn .3s ease; }
@keyframes modalFadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-card { background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 36px 40px; max-width: 520px; width: 90%;
  text-align: center; animation: modalPop .4s ease; }
@keyframes modalPop { from { transform: scale(.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.modal-card h2 { font-size: 1.6rem; margin-bottom: 8px; }
.modal-step { min-height: 200px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px; }
.modal-step .step-icon { font-size: 3.5rem; position: relative; }
.modal-step .step-text { font-size: 1.05rem; color: var(--text); line-height: 1.5; }
.step-finger { position: absolute; font-size: 1.8rem;
  animation: fingerBounce 1.2s ease-in-out infinite; }
@keyframes fingerBounce { 0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); } }
.step-dots { display: flex; gap: 8px; justify-content: center; margin: 16px 0 8px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all .3s; }
.step-dot.active { background: var(--primary); width: 24px; border-radius: 4px; }
.modal-btn { padding: 14px 40px; font-size: 1rem; border: none; border-radius: var(--radius-sm);
  background: var(--primary); color: #fff; font-weight: 700; cursor: pointer;
  transition: all .15s; }
.modal-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,92,231,.4); }
.step-scan-demo { display: flex; align-items: center; justify-content: center; gap: 16px; }
.step-scan-box { width: 64px; height: 64px; border: 3px solid var(--primary);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  position: relative; }
.step-scan-box svg { width: 36px; height: 36px; stroke: var(--primary); }
.step-vote-demo { display: flex; gap: 12px; align-items: center; position: relative; }
.step-vote-btn { padding: 10px 20px; border: 2px solid var(--border); border-radius: 10px;
  background: var(--surface2); color: var(--text); font-size: 0.85rem; font-weight: 600; }
.step-skip-btn { padding: 8px 20px; border-radius: 8px;
  background: var(--success); color: #fff; font-size: 0.8rem; font-weight: 600; }
.swipe-finger { position: absolute; font-size: 1.6rem; top: -8px; left: 10%;
  animation: swipeAcross 2.5s ease-in-out infinite; }
@keyframes swipeAcross { 0% { left: 10%; top: -8px; opacity: 1; }
  40% { left: 70%; top: -8px; opacity: 1; }
  60% { left: 70%; top: 40px; opacity: 1; }
  80% { left: 50%; top: 40px; opacity: 1; }
  90%,100% { left: 50%; top: 40px; opacity: 0; } }

/* ===== ADMIN COMMENTS ===== */
.comments-list { text-align: left; }
.comment-group { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
.comment-group h4 { font-size: 0.95rem; margin-bottom: 10px; color: var(--text);
  border-bottom: 1px solid var(--border); padding-bottom: 8px; }
.comment-item { padding: 6px 0; font-size: 0.85rem; }
.comment-item .comment-judge { font-weight: 700; color: var(--primary); }
.comment-item .comment-text { color: var(--text2); margin-left: 4px; }

/* ===== ADMIN ===== */
.pin-card { max-width: 360px; margin: 80px auto; background: var(--surface);
  border-radius: var(--radius); padding: 36px; border: 1px solid var(--border); text-align: center; }
.pin-card h2 { margin-bottom: 18px; }
.pin-input { width: 100%; padding: 14px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text);
  text-align: center; font-size: 1.4rem; letter-spacing: 8px; margin-bottom: 18px; }
.pin-card .btn { width: 100%; padding: 14px; }
.pin-error { color: #e74c3c; font-size: 0.85rem; margin-top: 10px; }
.tabs { display: flex; gap: 4px; margin-bottom: 20px; overflow-x: auto;
  border-bottom: 1px solid var(--border); }
.tab { padding: 10px 16px; font-weight: 600; color: var(--text2);
  border: none; background: none; border-bottom: 3px solid transparent;
  white-space: nowrap; font-size: 0.85rem; transition: all .15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* ===== RESULTS TABLE ===== */
.results-table { width: 100%; border-collapse: collapse; }
.results-table th { text-align: left; padding: 8px 12px; font-size: 0.75rem;
  color: var(--text2); text-transform: uppercase; letter-spacing: .5px;
  border-bottom: 1px solid var(--border); }
.results-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 0.88rem; }
.results-table tr:hover td { background: var(--surface2); }
.results-table .rank { font-weight: 700; color: var(--text2); width: 40px; }
.results-table .winner td { background: rgba(253,203,110,.08); }
.results-table .winner .rank { color: var(--warning); }
.tally-chip { padding: 3px 10px; border-radius: 16px; font-size: 0.78rem; font-weight: 600;
  background: var(--surface2); color: var(--text2); }
.tally-chip.has-votes { background: rgba(108,92,231,.15); color: var(--primary); }

/* ===== JUDGE GRID ===== */
.judge-grid-title { font-size: 1rem; font-weight: 700; margin-bottom: 12px; margin-top: 28px; }
.judge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
.judge-cell { background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 10px; }
.judge-cell-name { font-weight: 600; font-size: 0.82rem; }
.judge-cell-count { font-size: 0.78rem; color: var(--text2); }
.judge-cell-bar { width: 100%; height: 4px; background: var(--surface2);
  border-radius: 2px; margin-top: 5px; }
.judge-cell-fill { height: 100%; background: var(--primary); border-radius: 2px; }
.judge-cell.complete { border-color: var(--success); }
.judge-cell.complete .judge-cell-fill { background: var(--success); }

/* ===== QR CODES (admin print) ===== */
.qr-print-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.qr-print-card { background: #fff; border-radius: var(--radius); padding: 20px;
  text-align: center; color: #000; }
.qr-print-card h4 { font-size: 0.82rem; margin-bottom: 4px; color: #333; }
.qr-print-card .qr-cat { font-size: 0.7rem; color: #888; margin-bottom: 10px; }

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .main-layout { flex-direction: column; min-height: auto; }
  .scan-col { width: auto; order: 1; padding: 12px 0; }
  .grid-col { order: 2; }
  .btn-scan { padding: 28px 24px; font-size: 1.1rem; width: 100%; }
  .btn-scan svg { width: 48px; height: 48px; }
  .group-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .group-card { padding: 8px; min-height: 56px; }
  .group-name { font-size: 0.68rem; }
  .vote-option-btn { font-size: 1.2rem; width: min(26vw, 26vh); }
  .vote-options { gap: 10px; }
  .voting-header h3 { font-size: 1rem; }
  .voting-header { margin-bottom: 12px; }
  .btn-close-vote { padding: 8px 18px; font-size: 0.85rem; }
}

@media (min-width: 768px) {
  .group-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  .group-name { font-size: 1rem; }
  .group-card { padding: 14px; min-height: 80px; }
  .vote-option-btn { font-size: 2.2rem; width: min(36vh, 28vw); max-width: 340px; }
  .voting-header h3 { font-size: 1.8rem; }
  .voting-header { margin-bottom: 24px; }
  .btn-close-vote { padding: 14px 32px; font-size: 1.05rem; }
}

@media (min-width: 768px) and (orientation: landscape) {
  .container { padding: 8px 20px; }
  .header { padding: 4px 0; margin-bottom: 4px; }
  .progress-wrap { margin-bottom: 4px; }
  .scan-col { width: 30%; }
  .btn-scan { padding: 60px 44px; font-size: 1.8rem; border-radius: 24px; }
  .btn-scan svg { width: 100px; height: 100px; }
  .group-grid { grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .group-card { min-height: auto; padding: 8px 10px; }
  .group-name { font-size: 1rem; }
  .voting-panel { padding: 16px 48px; }
  .voting-header { margin-bottom: 12px; }
  .voting-header h3 { font-size: 2rem; }
  .vote-options { gap: 32px; }
  .vote-option-btn { font-size: 2.6rem; width: min(42vh, 28vw); max-width: 400px; }
  .btn-close-vote { padding: 14px 36px; font-size: 1.05rem; }
  .submit-row .btn { padding: 12px 48px; font-size: 1rem; }
}

@media print {
  body { background: #fff; color: #000; }
  .header, .tabs, .judge-grid-title, .judge-grid, #admin-results { display: none; }
  .qr-print-grid { display: grid !important; }
  .qr-print-card { border: 1px solid #ccc; break-inside: avoid; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ===== LOGIN VIEW ===== -->
<div id="view-login" class="container">
  <div class="login-card">
    <h2>2026 Asia Demo Crawl</h2>
    <p>Select your name to begin voting</p>
    <select id="judge-select">
      <option value="">-- Choose your name --</option>
    </select>
    <button class="btn btn-primary" onclick="loginAsJudge()">Start Voting</button>
    <div style="text-align:center; margin-top: 18px;">
      <button class="btn btn-outline btn-sm" onclick="showAdminLogin()">Admin Dashboard</button>
    </div>
  </div>
</div>

<!-- ===== JUDGE VIEW ===== -->
<div id="view-judge" class="container hidden">
  <div class="header">
    <h1>2026 Asia Demo Crawl</h1>
    <div class="header-actions">
      <span id="judge-label" style="color:var(--text); font-size:1.1rem; font-weight:600;"></span>
      <button class="btn btn-outline btn-sm" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Voting Progress</span>
      <span id="progress-text">0 / 21</span>
      <span id="prfaq-counter" style="margin-left:12px; color:var(--warning); font-weight:600;">PRFAQ: 0/4</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  </div>

  <div class="main-layout" id="main-layout">
    <!-- Left: Scan -->
    <div class="scan-col" id="scan-col">
      <div class="qr-reader-wrap hidden" id="qr-reader-wrap">
        <div id="qr-reader"></div>
        <div style="text-align:center; margin-top:8px;">
          <button class="btn btn-outline btn-sm" onclick="stopScanner()">Cancel</button>
        </div>
      </div>
      <button class="btn-scan" id="btn-scan" onclick="toggleScanner()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
          <rect x="7" y="7" width="10" height="10" rx="1"/>
        </svg>
        Scan QR
      </button>
      <div class="scan-hint">Scan booth QR to vote</div>
    </div>

    <!-- Right: Group Grid -->
    <div class="grid-col">
      <div class="group-grid" id="group-grid"></div>
    </div>
  </div>
</div>

<!-- ===== VOTING PANEL (full-screen overlay) ===== -->
<div class="voting-panel hidden" id="voting-panel">
  <div class="voting-header">
    <h3 id="voting-group-name"></h3>
    <button class="btn-close-vote" onclick="closeVoting()">Close</button>
  </div>
  <div class="vote-options" id="vote-options"></div>
  <div class="comment-wrap">
    <div class="comment-label">Comment (optional)</div>
    <textarea class="comment-input" id="vote-comment" placeholder="Leave a comment for the team..." rows="2"></textarea>
  </div>
  <div class="submit-row" style="margin-top:12px;">
    <button class="btn btn-success" id="btn-submit-vote" onclick="submitVote()">Submit Vote</button>
  </div>
</div>

<!-- ===== ADMIN PIN VIEW ===== -->
<div id="view-admin-pin" class="container hidden">
  <div class="pin-card">
    <h2>Admin Dashboard</h2>
    <input type="password" class="pin-input" id="pin-input" maxlength="10"
      placeholder="PIN" onkeydown="if(event.key==='Enter')verifyPin()">
    <button class="btn btn-primary" onclick="verifyPin()">Enter</button>
    <div class="pin-error hidden" id="pin-error">Incorrect PIN</div>
    <div style="margin-top: 14px;">
      <button class="btn btn-outline btn-sm" onclick="showLogin()">Back</button>
    </div>
  </div>
</div>

<!-- ===== ADMIN DASHBOARD ===== -->
<div id="view-admin" class="container hidden">
  <div class="header">
    <h1>Admin Dashboard</h1>
    <div class="header-actions">
      <button class="btn btn-sm" style="background:#e74c3c;color:#fff;" onclick="resetAllVotes()">🗑 Reset All Votes</button>
      <span style="color:var(--text2); font-size:0.78rem;">Auto-refresh: 5s</span>
      <button class="btn btn-outline btn-sm" onclick="showLogin()">Exit</button>
    </div>
  </div>
  <div class="tabs" id="admin-tabs"></div>
  <div id="admin-results"></div>
  <div id="admin-qr-codes" class="hidden"></div>
  <div class="judge-grid-title" id="judge-grid-title">Judge Completion</div>
  <div class="judge-grid" id="judge-grid"></div>
</div>

<script>
// ===== STATE =====
let CONFIG = { judges: [], groups: [] };
let currentJudge = null;
let currentGroupId = null;
let selectedChoices = [];
let judgeVotes = {};
let activeAdminTab = 0;
let adminRefreshTimer = null;
let heartbeatTimer = null;
let qrScanner = null;
let scannerRunning = false;
let qrProcessing = false;
let cameraRequesting = false;
const SESSION_ID = localStorage.getItem('session_id') || (Math.random().toString(36).slice(2) + Date.now().toString(36));
localStorage.setItem('session_id', SESSION_ID);

// ===== INIT =====
async function init() {
  const res = await fetch('/api/config');
  CONFIG = await res.json();

  // Try to restore session from localStorage
  const saved = localStorage.getItem('judge_name');
  if (saved && CONFIG.judges.includes(saved)) {
    const lockRes = await fetch('/api/judge/lock', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ judge: saved, session_id: SESSION_ID }),
    });
    if (lockRes.ok) {
      currentJudge = saved;
      document.getElementById('judge-label').textContent = currentJudge;
      if (heartbeatTimer) clearInterval(heartbeatTimer);
      heartbeatTimer = setInterval(sendHeartbeat, 60000);
      const vRes = await fetch(`/api/votes/${encodeURIComponent(currentJudge)}`);
      judgeVotes = await vRes.json();
      renderGroupGrid();
      showView('view-judge');
      return;
    }
    localStorage.removeItem('judge_name');
  }

  await populateJudgeSelect();
}

async function populateJudgeSelect() {
  const sel = document.getElementById('judge-select');
  while (sel.options.length > 1) sel.remove(1);
  const lockedRes = await fetch('/api/judge/locked');
  const lockedJudges = await lockedRes.json();
  CONFIG.judges.forEach(j => {
    const opt = document.createElement('option');
    opt.value = j;
    const isLocked = lockedJudges.includes(j);
    opt.textContent = isLocked ? `${j} (in use)` : j;
    opt.disabled = isLocked;
    sel.appendChild(opt);
  });
}

// ===== VIEW SWITCHING =====
function showView(id) {
  ['view-login', 'view-judge', 'view-admin-pin', 'view-admin'].forEach(v =>
    document.getElementById(v).classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  if (id !== 'view-admin' && adminRefreshTimer) {
    clearInterval(adminRefreshTimer); adminRefreshTimer = null;
  }
}
function showLogin() { showView('view-login'); }
function showAdminLogin() { showView('view-admin-pin'); document.getElementById('pin-input').value = ''; }

async function logout() {
  stopScanner();
  if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
  if (currentJudge) {
    await fetch('/api/judge/unlock', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ judge: currentJudge, session_id: SESSION_ID }),
    }).catch(() => {});
  }
  currentJudge = null;
  judgeVotes = {};
  localStorage.removeItem('judge_name');
  showView('view-login');
  await populateJudgeSelect();
}

// ===== JUDGE LOGIN =====
async function loginAsJudge() {
  const sel = document.getElementById('judge-select');
  if (!sel.value) return;
  const lockRes = await fetch('/api/judge/lock', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ judge: sel.value, session_id: SESSION_ID }),
  });
  if (!lockRes.ok) {
    const err = await lockRes.json();
    showToast(err.error || 'This judge is already in use');
    await populateJudgeSelect();
    return;
  }
  currentJudge = sel.value;
  localStorage.setItem('judge_name', currentJudge);
  document.getElementById('judge-label').textContent = currentJudge;
  if (heartbeatTimer) clearInterval(heartbeatTimer);
  heartbeatTimer = setInterval(sendHeartbeat, 60000);
  const res = await fetch(`/api/votes/${encodeURIComponent(currentJudge)}`);
  judgeVotes = await res.json();
  renderGroupGrid();
  showView('view-judge');
  showInstructions(currentJudge);
}

function sendHeartbeat() {
  if (!currentJudge) return;
  fetch('/api/judge/heartbeat', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ judge: currentJudge, session_id: SESSION_ID }),
  }).catch(() => {});
}

// ===== QR SCANNER =====
function toggleScanner() {
  if (scannerRunning) stopScanner(); else startScanner();
}

function startScanner() {
  document.getElementById('qr-reader-wrap').classList.remove('hidden');
  scannerRunning = true; qrProcessing = false;
  qrScanner = new Html5Qrcode("qr-reader");
  cameraRequesting = true;
  qrScanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 220, height: 220 } },
    (text) => { if (!qrProcessing) { qrProcessing = true; onQrScanned(text); } },
    () => {}
  ).then(() => { cameraRequesting = false; })
   .catch(() => { cameraRequesting = false; showToast('Camera not available'); stopScanner(); });
}

async function stopScanner() {
  scannerRunning = false;
  document.getElementById('qr-reader-wrap').classList.add('hidden');
  if (qrScanner) {
    try { await qrScanner.stop(); } catch(e) {}
    try { qrScanner.clear(); } catch(e) {}
    qrScanner = null;
  }
}

async function onQrScanned(text) {
  await stopScanner();
  const cleaned = text.trim();
  const group = CONFIG.groups.find(g => g.id === cleaned);
  if (group) { openVoting(group.id); return; }
  const match = cleaned.match(/[?&]group=([^&]+)/);
  if (match) {
    const g = CONFIG.groups.find(gr => gr.id === decodeURIComponent(match[1]));
    if (g) { openVoting(g.id); return; }
  }
  showToast('Unknown QR: ' + cleaned);
  qrProcessing = false;
}

// ===== PRFAQ LIMIT =====
const MAX_PRFAQ = 4;
function getPrfaqCount(excludeGroupId) {
  let count = 0;
  for (const [gid, v] of Object.entries(judgeVotes)) {
    if (gid === excludeGroupId) continue;
    if (v.vote_choices && v.vote_choices.includes('PRFAQ')) count++;
  }
  return count;
}

function updatePrfaqCounter() {
  const el = document.getElementById('prfaq-counter');
  if (el) el.textContent = `PRFAQ: ${getPrfaqCount(null)}/${MAX_PRFAQ}`;
}

// ===== GROUP GRID =====
function renderGroupGrid() {
  const grid = document.getElementById('group-grid');
  grid.innerHTML = '';
  let scored = 0;
  CONFIG.groups.forEach(g => {
    const existing = judgeVotes[g.id];
    const isScored = existing != null;
    if (isScored) scored++;
    const card = document.createElement('div');
    card.className = `group-card${isScored ? ' scored' : ''}${currentGroupId === g.id ? ' active' : ''}`;
    card.onclick = () => openVoting(g.id);
    const displayCat = g.display_category || g.category;
    const hasPrfaq = existing && existing.vote_choices && existing.vote_choices.includes('PRFAQ');
    // Split "1. Some Name" into number and rest; use card_name for display
    const numMatch = g.name.match(/^(\d+)\.\s*(.*)$/);
    const numPart = numMatch ? numMatch[1] : '';
    const namePart = g.card_name || (numMatch ? numMatch[2] : g.name);
    card.innerHTML = `
      <div class="card-badges">
        <span class="badge badge-${displayCat}">${displayCat}</span>
        ${hasPrfaq ? '<span class="badge badge-prfaq">PRFAQ</span>' : ''}
      </div>
      <div class="group-name">${namePart}</div>
      ${isScored ? '<span class="check-mark">&#10003;</span>' : ''}
    `;
    grid.appendChild(card);
  });
  document.getElementById('progress-text').textContent = `${scored} / ${CONFIG.groups.length}`;
  document.getElementById('progress-fill').style.width = `${(scored / CONFIG.groups.length) * 100}%`;
  updatePrfaqCounter();
  checkAllVotesComplete();
}

// ===== VOTING =====
function openVoting(groupId) {
  currentGroupId = groupId;
  selectedChoices = [];
  const group = CONFIG.groups.find(g => g.id === groupId);
  if (!group) return;

  document.getElementById('voting-group-name').textContent = group.name;

  const optionsContainer = document.getElementById('vote-options');
  optionsContainer.innerHTML = '';

  const existing = judgeVotes[groupId];
  const existingChoices = existing ? (existing.vote_choices || []) : [];
  selectedChoices = [...existingChoices];

  group.vote_options.forEach(opt => {
    const label = opt.label || opt;
    const subtitle = opt.subtitle || '';
    const btn = document.createElement('button');
    btn.className = 'vote-option-btn';
    btn.dataset.option = label;
    btn.innerHTML = subtitle
      ? `${label}<span class="option-subtitle">${subtitle}</span>`
      : label;
    if (existingChoices.includes(label)) btn.classList.add('selected');
    btn.onclick = () => toggleOption(label);
    optionsContainer.appendChild(btn);
  });

  // Load existing comment
  const commentEl = document.getElementById('vote-comment');
  commentEl.value = existing ? (existing.comment || '') : '';

  updateSubmitButton();
  document.getElementById('voting-panel').classList.remove('hidden');
}

function toggleOption(option) {
  const idx = selectedChoices.indexOf(option);
  if (idx >= 0) {
    selectedChoices.splice(idx, 1);
  } else {
    if (option === 'PRFAQ' && getPrfaqCount(currentGroupId) >= MAX_PRFAQ) {
      showToast(`You can only select PRFAQ for up to ${MAX_PRFAQ} groups`, 'warning');
      return;
    }
    selectedChoices.push(option);
  }
  document.querySelectorAll('.vote-option-btn').forEach(btn => {
    btn.classList.toggle('selected', selectedChoices.includes(btn.dataset.option));
  });
  updateSubmitButton();
}

function updateSubmitButton() {
  const btn = document.getElementById('btn-submit-vote');
  if (selectedChoices.length === 0) {
    btn.textContent = 'Skip (Not Applicable)';
    btn.className = 'btn btn-success';
    btn.style.padding = '16px 56px';
    btn.style.fontSize = '1.1rem';
  } else {
    btn.textContent = 'Submit Vote';
    btn.className = 'btn btn-success';
    btn.style.padding = '16px 56px';
    btn.style.fontSize = '1.1rem';
  }
}

function closeVoting() {
  currentGroupId = null; selectedChoices = [];
  document.getElementById('voting-panel').classList.add('hidden');
  renderGroupGrid();
}

async function submitVote() {
  if (!currentGroupId) return;
  if (selectedChoices.includes('PRFAQ') && getPrfaqCount(currentGroupId) >= MAX_PRFAQ) {
    showToast(`You can only select PRFAQ for up to ${MAX_PRFAQ} groups`, 'warning');
    return;
  }
  const res = await fetch('/api/vote', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ judge: currentJudge, group_id: currentGroupId, vote_choices: selectedChoices, comment: document.getElementById('vote-comment').value.trim() }),
  });
  if (res.ok) {
    judgeVotes[currentGroupId] = { vote_choices: [...selectedChoices], comment: document.getElementById('vote-comment').value.trim() };
    showToast('Vote submitted!');
    closeVoting();
  } else {
    const err = await res.json();
    showToast(err.error || 'Error submitting vote');
  }
}

// ===== ADMIN =====
async function verifyPin() {
  const pin = document.getElementById('pin-input').value;
  const res = await fetch('/api/admin/verify', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pin }),
  });
  if (res.ok) {
    showView('view-admin'); renderAdminTabs(); loadAdminData();
    adminRefreshTimer = setInterval(loadAdminData, 5000);
  } else { document.getElementById('pin-error').classList.remove('hidden'); }
}

function getAdminTabNames() {
  const cats = [];
  CONFIG.groups.forEach(g => {
    const dc = g.display_category || g.category;
    if (!cats.includes(dc)) cats.push(dc);
  });
  return [...cats, 'Comments', 'QR Codes'];
}

function renderAdminTabs() {
  const container = document.getElementById('admin-tabs');
  container.innerHTML = '';
  getAdminTabNames().forEach((name, i) => {
    const tab = document.createElement('button');
    tab.className = `tab${i === activeAdminTab ? ' active' : ''}`;
    tab.textContent = name;
    tab.onclick = () => { activeAdminTab = i; renderAdminTabs(); loadAdminData(); };
    container.appendChild(tab);
  });
}

async function loadAdminData() {
  const tabNames = getAdminTabNames();
  const currentTab = tabNames[activeAdminTab] || tabNames[0];

  if (currentTab === 'Comments') {
    document.getElementById('admin-results').innerHTML = '';
    document.getElementById('admin-qr-codes').classList.add('hidden');
    document.getElementById('judge-grid-title').classList.add('hidden');
    document.getElementById('judge-grid').classList.add('hidden');
    document.getElementById('admin-results').classList.remove('hidden');
    await renderComments(); return;
  }

  if (currentTab === 'QR Codes') {
    document.getElementById('admin-results').classList.add('hidden');
    document.getElementById('admin-qr-codes').classList.remove('hidden');
    document.getElementById('judge-grid-title').classList.add('hidden');
    document.getElementById('judge-grid').classList.add('hidden');
    renderQrCodes(); return;
  }

  document.getElementById('admin-results').classList.remove('hidden');
  document.getElementById('admin-qr-codes').classList.add('hidden');
  document.getElementById('judge-grid-title').classList.remove('hidden');
  document.getElementById('judge-grid').classList.remove('hidden');

  const [resultsRes, progressRes] = await Promise.all([fetch('/api/results'), fetch('/api/progress')]);
  const results = await resultsRes.json();
  const progress = await progressRes.json();
  const catResult = results.find(r => r.category === currentTab);
  renderResults(catResult);
  renderJudgeGrid(progress);
}

function renderResults(catResult) {
  const container = document.getElementById('admin-results');
  if (!catResult || !catResult.groups.length) {
    container.innerHTML = '<p style="color:var(--text2);">No data yet.</p>'; return;
  }
  const options = catResult.vote_options || [];
  // Separate scoring options (count toward Total) from non-scoring (PRE-ORDER)
  const nonScoringOptions = ['PRE-ORDER'];
  const scoringOpts = options.filter(o => !nonScoringOptions.includes(o));
  const extraOpts = options.filter(o => nonScoringOptions.includes(o));

  // Column order: Rank, Group, [scoring opts], Total, [extra opts like PRE-ORDER], Judges
  let html = `<table class="results-table"><thead><tr><th>Rank</th><th>Group</th>`;
  scoringOpts.forEach(opt => { html += `<th>${opt}</th>`; });
  html += `<th>Total</th>`;
  extraOpts.forEach(opt => { html += `<th>${opt}</th>`; });
  html += `<th>Judges</th></tr></thead><tbody>`;

  // Build set of valid options per original_category
  const optionsByOrigCat = {};
  CONFIG.groups.forEach(gr => {
    if (!optionsByOrigCat[gr.category]) {
      const opts = (gr.vote_options || []).map(o => o.label || o);
      optionsByOrigCat[gr.category] = new Set(opts);
    }
  });

  // Sort groups by scored total (excluding PRE-ORDER)
  const sortedGroups = [...catResult.groups].sort((a, b) => {
    const aTotal = scoringOpts.reduce((sum, opt) => sum + (a.votes[opt] || 0), 0);
    const bTotal = scoringOpts.reduce((sum, opt) => sum + (b.votes[opt] || 0), 0);
    return bTotal - aTotal;
  });

  sortedGroups.forEach((g, i) => {
    const validOpts = optionsByOrigCat[g.original_category] || new Set();
    const scoredTotal = scoringOpts.reduce((sum, opt) => sum + (validOpts.has(opt) ? (g.votes[opt] || 0) : 0), 0);
    const isWinner = i === 0 && scoredTotal > 0;

    html += `<tr class="${isWinner ? 'winner' : ''}">
      <td class="rank">${isWinner ? '\u{1F3C6}' : i + 1}</td><td>${g.name}</td>`;
    // Scoring option columns
    scoringOpts.forEach(opt => {
      if (!validOpts.has(opt)) {
        html += `<td><span class="tally-chip" style="opacity:.25;">—</span></td>`;
      } else {
        const count = g.votes[opt] || 0;
        html += `<td><span class="tally-chip${count > 0 ? ' has-votes' : ''}">${count}</span></td>`;
      }
    });
    // Total column (only scoring options)
    html += `<td style="font-weight:700;">${scoredTotal}</td>`;
    // Extra option columns (PRE-ORDER etc.)
    extraOpts.forEach(opt => {
      if (!validOpts.has(opt)) {
        html += `<td><span class="tally-chip" style="opacity:.25;">—</span></td>`;
      } else {
        const count = g.votes[opt] || 0;
        html += `<td><span class="tally-chip${count > 0 ? ' has-votes' : ''}">${count}</span></td>`;
      }
    });
    html += `<td style="color:var(--text2);font-size:0.82rem;">${g.judge_count}</td></tr>`;
  });
  html += '</tbody></table>';
  container.innerHTML = html;
}

function renderJudgeGrid(progress) {
  const container = document.getElementById('judge-grid');
  container.innerHTML = '';
  CONFIG.judges.forEach(j => {
    const p = progress[j] || { completed: 0, total: CONFIG.groups.length };
    const pct = (p.completed / p.total) * 100;
    const cell = document.createElement('div');
    cell.className = `judge-cell${p.completed === p.total ? ' complete' : ''}`;
    cell.innerHTML = `<div style="flex:1;">
      <div style="display:flex;justify-content:space-between;">
        <span class="judge-cell-name">${j}</span>
        <span class="judge-cell-count">${p.completed}/${p.total}</span>
      </div>
      <div class="judge-cell-bar"><div class="judge-cell-fill" style="width:${pct}%"></div></div>
    </div>`;
    container.appendChild(cell);
  });
}

function renderQrCodes() {
  const container = document.getElementById('admin-qr-codes');
  container.innerHTML = '<p style="color:var(--text2);margin-bottom:12px;">Print QR codes for each booth.</p>';
  const grid = document.createElement('div');
  grid.className = 'qr-print-grid';
  CONFIG.groups.forEach(g => {
    const card = document.createElement('div');
    card.className = 'qr-print-card';
    card.innerHTML = `<h4>${g.name}</h4><div class="qr-cat">${g.category} | ${g.id}</div><div id="qr-${g.id}"></div>`;
    grid.appendChild(card);
  });
  container.appendChild(grid);
  const btn = document.createElement('button');
  btn.className = 'btn btn-primary'; btn.style.marginTop = '16px';
  btn.textContent = 'Print QR Codes'; btn.onclick = () => window.print();
  container.appendChild(btn);
  requestAnimationFrame(() => {
    CONFIG.groups.forEach(g => {
      const el = document.getElementById(`qr-${g.id}`);
      if (el) new QRCode(el, { text: g.id, width: 140, height: 140, correctLevel: QRCode.CorrectLevel.M });
    });
  });
}

// ===== ADMIN COMMENTS =====
async function renderComments() {
  const container = document.getElementById('admin-results');
  const res = await fetch('/api/comments');
  const comments = await res.json();
  const groupMap = {};
  CONFIG.groups.forEach(g => { groupMap[g.id] = g.name; });
  let html = '<div class="comments-list">';
  let hasAny = false;
  CONFIG.groups.forEach(g => {
    const gc = comments[g.id];
    if (!gc || gc.length === 0) return;
    hasAny = true;
    html += `<div class="comment-group"><h4>${g.name}</h4>`;
    gc.forEach(c => {
      html += `<div class="comment-item"><span class="comment-judge">${c.judge}:</span><span class="comment-text">${c.comment}</span></div>`;
    });
    html += '</div>';
  });
  if (!hasAny) html += '<p style="color:var(--text2);">No comments yet.</p>';
  html += '</div>';
  container.innerHTML = html;
}

// ===== INSTRUCTIONS MODAL =====
function showInstructions(judgeName) {
  const key = `instructions_shown_${judgeName}`;
  if (localStorage.getItem(key)) return;
  localStorage.setItem(key, '1');
  let step = 0;
  const steps = [
    { icon: `<div class="step-scan-demo"><div class="step-scan-box"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg><span class="step-finger" style="bottom:-18px;right:-12px;">👆</span></div></div>`,
      text: 'Scan the QR code at each booth,<br>or tap the group card to start' },
    { icon: `<div style="position:relative;"><div class="step-vote-demo"><div class="step-vote-btn">Option A</div><div class="step-vote-btn">Option B</div><div class="step-skip-btn">Skip</div><span class="swipe-finger">👆</span></div></div>`,
      text: 'Select your vote options,<br>or skip if not applicable' },
    { icon: '<div style="font-size:3.5rem;">💬</div>',
      text: 'Optionally leave a comment<br>for the team' },
  ];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  function render() {
    const s = steps[step];
    const isLast = step === steps.length - 1;
    overlay.innerHTML = `<div class="modal-card">
      <h2>Welcome, ${judgeName}! 👋</h2>
      <div class="modal-step">${s.icon}<div class="step-text">${s.text}</div></div>
      <div class="step-dots">${steps.map((_,i) => `<div class="step-dot${i===step?' active':''}"></div>`).join('')}</div>
      <button class="modal-btn" id="modal-next-btn">${isLast ? "Got it, let's go! 🚀" : 'Next →'}</button>
    </div>`;
    overlay.querySelector('#modal-next-btn').onclick = () => {
      if (isLast) { overlay.remove(); } else { step++; render(); }
    };
  }
  render();
  document.body.appendChild(overlay);
}

// ===== CONFETTI CELEBRATION =====
let celebrationShown = false;

function checkAllVotesComplete() {
  if (celebrationShown) return;
  const totalGroups = CONFIG.groups.length;
  const votedCount = Object.keys(judgeVotes).length;
  if (totalGroups > 0 && votedCount >= totalGroups) {
    celebrationShown = true;
    launchConfetti();
  }
}

function launchConfetti() {
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);
  const colors = ['#6c5ce7','#00b894','#fdcb6e','#e17055','#0984e3','#a29bfe','#ff6b6b','#ffd93d','#6bcb77','#4d96ff'];
  for (let i = 0; i < 150; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.width = piece.style.height = (Math.random() * 8 + 6) + 'px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    piece.style.animationDuration = (Math.random() * 2 + 2) + 's';
    piece.style.animationDelay = (Math.random() * 1.5) + 's';
    container.appendChild(piece);
  }
  const text = document.createElement('div');
  text.className = 'celebration-text';
  text.textContent = '\u{1F389} All Votes Complete! \u{1F389}';
  document.body.appendChild(text);
  setTimeout(() => { container.remove(); text.remove(); }, 5000);
}

// ===== RESET ALL VOTES =====
async function resetAllVotes() {
  if (!confirm('⚠️ Are you sure you want to reset ALL votes and sessions?\n\nThis action cannot be undone!')) return;
  const pin = prompt('Enter admin PIN to confirm:');
  if (!pin) return;
  const res = await fetch('/api/admin/reset', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pin }),
  });
  if (res.ok) {
    showToast('All votes and sessions have been cleared!');
    loadAdminData();
  } else {
    showToast('Failed to reset: invalid PIN', 'warning');
  }
}

// ===== TOAST =====
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type === 'warning' ? 'var(--warning)' : 'var(--success)';
  el.style.color = type === 'warning' ? '#000' : '#fff';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ===== PAGE UNLOAD =====
window.addEventListener('beforeunload', () => {
  if (currentJudge && !cameraRequesting) {
    navigator.sendBeacon('/api/judge/unlock',
      new Blob([JSON.stringify({ judge: currentJudge, session_id: SESSION_ID })],
        { type: 'application/json' }));
  }
});

// ===== PWA =====
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

// ===== START =====
init();
</script>
